server.port=8080
spring.application.name=aadhaar-verification

# H2 (in-memory) for quick run
spring.datasource.url=jdbc:h2:mem:aadhaar_db;DB_CLOSE_DELAY=-1;MODE=LEGACY
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# DigiLocker placeholders (fill in from DigiLocker Partner Portal)
# Example authorize URL: https://test.digilocker.gov.in/oauth/authorize
# Example token URL:      https://test.digilocker.gov.in/oauth/token
# Example base file:      https://test.digilocker.gov.in/api/1/files

digilocker.client-id=YOUR_CLIENT_ID
digilocker.client-secret=YOUR_CLIENT_SECRET
digilocker.redirect-uri=http://localhost:8080/api/digilocker/callback

digilocker.oauth-authorize-url=https://test.digilocker.gov.in/oauth/authorize
digilocker.oauth-token-url=https://test.digilocker.gov.in/oauth/token
digilocker.files-base-url=https://test.digilocker.gov.in/api/1.0/  

# Encryption (AES-GCM) - provide base64 key (16/24/32 bytes)
# Example: encryption.key=BASE64_ENCODED_32_BYTES
# Must be set via env var or application profile in real deployments
encryption.key=${ENCRYPTION_KEY:}






